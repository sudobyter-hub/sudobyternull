<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="sudobyter">
  <!-- dark rounded square background -->
  <rect x="2" y="2" width="60" height="60" rx="11"
        fill="#0a0e0b" stroke="#1f2a22" stroke-width="1.5"/>

  <!-- subtle inner accent ring -->
  <rect x="4" y="4" width="56" height="56" rx="9"
        fill="none" stroke="#5bd66d" stroke-width="0.6" opacity="0.18"/>

  <!-- scan-line vibe (very subtle) -->
  <g opacity="0.06" fill="#5bd66d">
    <rect x="4" y="14" width="56" height="0.5"/>
    <rect x="4" y="24" width="56" height="0.5"/>
    <rect x="4" y="34" width="56" height="0.5"/>
    <rect x="4" y="44" width="56" height="0.5"/>
    <rect x="4" y="54" width="56" height="0.5"/>
  </g>

  <!-- the > prompt -->
  <path d="M 15 22 L 28 32 L 15 42"
        fill="none" stroke="#5bd66d" stroke-width="5"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- the _ blinking cursor -->
  <rect x="33" y="39" width="17" height="5" rx="1" fill="#5bd66d">
    <animate attributeName="opacity"
             values="1;1;1;1;0;0;0;1"
             dur="1.4s"
             repeatCount="indefinite"/>
  </rect>
</svg>
